<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Test</title>
<script src="https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
<style>
  body { font-family: sans-serif; background: #f0f4ff; padding: 20px; }
  video { width: 100%; max-width: 400px; border-radius: 10px; }
  #result {
    margin-top: 16px;
    background: #fff;
    border: 2px solid #1e6fb5;
    border-radius: 8px;
    padding: 16px;
    font-size: 1.1rem;
    word-break: break-all;
    min-height: 60px;
  }
  #raw {
    margin-top: 10px;
    background: #222;
    color: #0f0;
    border-radius: 8px;
    padding: 14px;
    font-family: monospace;
    font-size: 0.85rem;
    word-break: break-all;
    min-height: 40px;
  }
  button {
    margin-top: 12px;
    padding: 12px 24px;
    background: #1e6fb5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
  }
</style>
</head>
<body>
<h2>QR Debug Test</h2>
<video id="v" playsinline></video>
<br/>
<button onclick="start()">▶ Start Camera</button>
<button onclick="stop()" style="background:#c00;">■ Stop</button>

<div id="result">Scan karo — result yahan aayega</div>
<div id="raw">Raw JSON yahan dikhega</div>

<script>
let scanner = null;

async function start() {
  const v = document.getElementById('v');
  scanner = new QrScanner(v, result => {
    const data = typeof result === 'object' ? result.data : result;
    document.getElementById('result').innerText = '✅ DATA: ' + data;
    document.getElementById('raw').innerText = 'JSON.stringify: ' + JSON.stringify(data) + '\n\nParts by |: ' + JSON.stringify(data.split('|')) + '\nParts by \\n: ' + JSON.stringify(data.split('\n'));
  }, {
    preferredCamera: 'environment',
    highlightScanRegion: true,
    maxScansPerSecond: 5
  });
  await scanner.start();
}

function stop() {
  if (scanner) { scanner.stop(); scanner.destroy(); scanner = null; }
}
</script>
</body>
</html>
